<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicSentinel - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              slate: {
                850: '#151e2e',
                950: '#020617',
              }
            }
          }
        }
      }
    </script>

    <style>
      /* Smooth Scrolling */
      html { scroll-behavior: smooth; }
      
      /* Premium Dark Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 10px;
        border: 2px solid #020617; /* Creates padding effect */
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }

      /* Map Dark Mode Override */
      .leaflet-container {
        background: #020617 !important;
        font-family: 'Inter', sans-serif !important;
      }
      
      /* Tactical Map Markers */
      .tactical-marker {
        position: relative;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .tactical-marker .core {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        position: absolute;
        z-index: 2;
        box-shadow: 0 0 10px currentColor;
      }
      
      .tactical-marker .ping {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        animation: sonar 2s infinite cubic-bezier(0, 0, 0.2, 1);
        opacity: 0.5;
        z-index: 1;
        border: 1px solid currentColor;
      }

      .marker-critical { color: #ef4444; }
      .marker-critical .core { background-color: #ef4444; }
      
      .marker-normal { color: #3b82f6; }
      .marker-normal .core { background-color: #3b82f6; }

      .marker-resolved { color: #10b981; }
      .marker-resolved .core { background-color: #10b981; }

      .marker-analyzing { color: #6366f1; }
      .marker-analyzing .core { background-color: #6366f1; }
      .marker-analyzing .ping { animation-duration: 1s; }
      
      @keyframes sonar {
        0% { transform: scale(0.5); opacity: 0.8; }
        100% { transform: scale(2.5); opacity: 0; }
      }

      /* Cluster Customization */
      .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
        background-color: rgba(15, 23, 42, 0.8) !important;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .marker-cluster div {
        background-color: transparent !important;
        color: white;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "leaflet": "https://esm.sh/leaflet@^1.9.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-leaflet": "https://esm.sh/react-leaflet@^5.0.0",
    "react-leaflet-cluster": "https://esm.sh/react-leaflet-cluster@^2.1.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-950 text-slate-200 overflow-hidden font-sans selection:bg-emerald-500/30 selection:text-emerald-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
