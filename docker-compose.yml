version: '3.8'

services:
  db:
    image: postgres:15
    container_name: civicsentinel-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: civicsentinel
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql_defense_setup.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
